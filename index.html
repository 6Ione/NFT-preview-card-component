<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap">  <title>Frontend Mentor | NFT preview card component</title>

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body {
      background-color: hsl(217, 54%, 11%);
      font-family: 'Outfit', serif;
      font-weight: 400;
    }

    .NFT-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    
    .NFT-content {
      background-color: hsl(216, 50%, 16%);
      max-width: 320px;
      border-radius: 15px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .NFT-image-link {
      position: relative;
      display: block;
      width: 85%;
      margin: 25px auto;
      border-radius: 8px;
      overflow: hidden;
    }

    .NFT-image-link {
      width: 85%;
      border-radius: 8px;
    }

    .NFT-image-link::after {
      content: '';
      position: absolute;
      inset: 0;
      background-color: hsl(178, 100%, 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 8px;
    }

    .NFT-image-link:hover::after {
      opacity: 0.5;
    }
    
    .base-image {
      display: block;
      width: 100%;
      border-radius: 8px;

    }

    .hover-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: 25%;
      height: auto;

      opacity: 0;
      z-index: 2;
      transition: opacity 0.3s ease;
    }

    .NFT-image-link:hover .hover-image {
      opacity: 1;
    }

    .NFT-Title h1 {
      display: flex;
      color: hsl(0, 0%, 100%);
      padding-left: 25px;
      margin-bottom: 10px;
      text-align: left;
      font-size: 1.3em;
      font-weight: 600;
    }

    .nft-title-link {
      color: hsl(0, 0%, 100%);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nft-title-link:hover {
      color: hsl(178, 100%, 50%);
    }

    .NFT-Title p {
      display: flex;
      color: hsl(215, 51%, 70%);
      padding-left: 25px;
      margin-bottom: 30px;
      text-align: left;
      font-size: 1.0em;
      font-weight: 300;
    }

    .NFT-bottom-section {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
    }

    .NFT-price {
      display: flex;
      align-items: center;
      gap: 6px;
      color: hsl(178, 100%, 50%);
      padding-left: 25px;
      text-align: left;
    }

    .NFT-time-left {
      display: flex;
      align-items: center;
      gap: 6px;
      color: hsl(215, 51%, 70%);
      padding-right: 25px;
      text-align: right;
      font-weight: 300;
    }

    .NFT-creator {
      display: flex;
      align-items: center;
      justify-content: left;
      gap: 12px;
      padding-left: 25px;
      margin-bottom: 20px;
      color: hsl(215, 51%, 70%);
      font-weight: 300;
    }

    .NFT-creator img {
      width: 10%;
      border: 1px solid white;
      border-radius: 50%;
    }

    .author-link {
      color: hsl(0, 0%, 100%);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    .author-link:hover {
      color: hsl(178, 100%, 50%);
    }

    hr {
      width: 85%;
      opacity: 20%;
    }

    @media (min-width: 768px) {
      .NFT-content {
        max-width: 500px;
      }
    }

    @media (min-width: 1440px) {
      .NFT-content {
        max-width: 330px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="NFT-container">
      <div class="NFT-content">

        <div class="NFT-Title">
          <!-- NFT image -->
           <div class="image-container">
              <a href="#" class="NFT-image-link">
                <img src="images/image-equilibrium.jpg" alt="equilibrium-NFT-Image" class="base-image">
                <img src="images/icon-view.svg" alt="View Icon" class="hover-image">
              </a>
           </div>
           <!-- NFT Name -->
           <h1><a href="#" class="nft-title-link">Equilibrium #3429</a></h1>
          <!-- NFT description -->
           <p>Our Equilibrium collection promotes balance and calm.</p>
        </div>

        <div class="NFT-bottom-section">
          <span class="NFT-price" id="NFT-price"> <img src="images/icon-ethereum.svg">0.041 ETH</span>
          <span class="NFT-time-left" id="NFT-time-left"> <img src="images/icon-clock.svg"> 3 Days left</span>
        </div>

        <hr>
        <div class="NFT-creator">
          <!-- Author picture -->
           <img src="images/image-avatar.png" alt="creators-picture">
          <!-- Author name -->
           <p>Creation of <a class="author-link" href="#">Jules Wyvern</a></p>
        </div>
      </div>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Capo</a>.
  </footer>
</body>
</html>
